<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Attributes</title>
</head>
<body>
    <label>Enter the data</label>
    <input value="num" name="value" readonly><br>
    <label>Enter</label>
    <input type="text" disabeled><br>
     <label>Enter the number</label>
    <input type="number" id="myid"  ><br><br>
    <input placeholder="Enter the age" required="" autofocus><br>
    <input type="text" size="100"><br>
    
    <input type="text"  hidden><br>
    <input type="text" minlength="3" >
    <br>
    <input type="text" maxlength="3"><br>
    <input title="MyTitle">

    <form>
        <fieldset>
            <legend>Login</legend>
            <label for="usernamee">Usename</label>
            <input type="text" id="usernamee" autocomplete="on"><br>
            <label for="passwords">Password</label>
            <input type="text" id="passwords">

        </fieldset>
    </form>
    


</body>
</html>
