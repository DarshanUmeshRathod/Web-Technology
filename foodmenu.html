<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Food Menu</title>

<style>
  body{
    font-family: "Times New Roman", serif;
  }
  table{
    border-collapse: collapse;
    margin: 20px auto;
    text-align: center;
  }
  th, td{
    border: 1px solid black;
    padding: 10px;
  }
  img{
    width: 200px;
    height: 150px;
  }
  button{
    margin-top: 5px;
  }
</style>
</head>

<body>

<center>
<table>
  <tr>
    <th colspan="3">FOOD MENU</th>
  </tr>

  <tr>
    <!-- Pizza -->
    <td>
      <a href="https://www.pizzahut.co.in/" target="_blank">
        <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=300&h=200&fit=crop" alt="Pizza">
      </a>
      <br>
      <button>Pizza</button>
    </td>

    <!-- Burger -->
    <td>
      <a href="https://www.burgerking.in/" target="_blank">
        <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300&h=200&fit=crop" alt="Burger">
      </a>
      <br>
      <button>Hamburger</button>
    </td>

    <!-- Gobi -->
    <td>
      <a href="https://magicpin.in/Bangalore/Yelahanka/Restaurant/Gobi-Corner/store/107a56/" target="_blank">
        <img src="https://images.unsplash.com/photo-1567620832903-9fc6debc209f?w=300&h=200&fit=crop" alt="Gobi">
      </a>
      <br>
      <button>Gobi</button>
    </td>
  </tr>

  <tr>
    <!-- Egg -->
    <td>
      <a href="https://egg-corner.wheree.com/" target="_blank">
        <img src="https://images.unsplash.com/photo-1587486913049-53fc88980cfc?w=300&h=200&fit=crop" alt="Egg">
      </a>
      <br>
      <button>Boiled Egg</button>
    </td>

    <!-- Chips -->
    <td>
      <a href="https://snackstar.in/products/chips-ahoy-mini-chocolate-28g" target="_blank">
        <img src="https://images.unsplash.com/photo-1566478989037-eec170784d0b?w=300&h=200&fit=crop" alt="Chips">
      </a>
      <br>
      <button>Chips</button>
    </td>

    <!-- Ice Cream -->
    <td>
      <a href="https://www.ibaco.in/" target="_blank">
        <img src="https://images.unsplash.com/photo-1497034825429-c343d7c6a68f?w=300&h=200&fit=crop" alt="Ice Cream">
      </a>
      <br>
      <button>Ice Cream</button>
    </td>
  </tr>

</table>
</center>

</body>
</html>
