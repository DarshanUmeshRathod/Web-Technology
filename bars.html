<!DOCTYPE html>
<html>
<head>
    <title>Task Navbar</title>

    <style>

        *{
            font-family:Segoe UI;
            font-weight:bold;
        }
        body{
            background-color:black;
        }

        
        nav{
            height:75px;
            width:100%;
            display:flex;
            justify-content:space-between;
            align-items:center;
            
        }

        #logoblock,#menublock,#searchblock{
            height:75px;
            display:flex;
            align-items:center;
            
        }

        #logoblock{
            width:400px;
            justify-content:space-evenly;
        }

        #searchblock{
            width:300px;
            justify-content:space-evenly;
        }

        #menublock{
            width:300px;
            justify-content:space-evenly;
        }

        a{
            text-decoration:none;
            color:white;
        }

        input{
            height:30px;
        }

        button{
            height:34px;
        }

        
        #nav1{
            background-color:black;
            color:white;
            border:6px solid white;
        }

    
        #nav2{
            background:blue;
            color:white;
        }

        
        #nav3{
            background-color:white;
            color:black;
        }

        #nav3 a{
            color:black;
        }

    </style>
</head>

<body>

    
    <nav id="nav1">
        <div id="logoblock">
            <a href="">Brand</a>
            <a href="">Home</a>
            <a href="">About</a>
            <a href="">Products</a>
        </div>

        <div id="searchblock">
            <input type="text" placeholder="Search">
            <button>Search</button>
        </div>
    </nav>

    <br><br>

    
    <nav id="nav2">
        <div id="logoblock">
            <a href="">Brand</a>
            <a href="">Home</a>
            <a href="">About</a>
            <a href="">Products</a>
        </div>

        <div id="searchblock">
            <input type="text" placeholder="Search">
            <button>Search</button>
        </div>
    </nav>

    <br><br>

    
    <nav id="nav3">
        <div id="logoblock">
            <a href="">Brand</a>
            <a href="">Home</a>
            <a href="">About</a>
            <a href="">Products</a>
        </div>

        <div id="searchblock">
            <input type="text" placeholder="Search">
            <button>Search</button>
        </div>
    </nav>

</body>
</html>
