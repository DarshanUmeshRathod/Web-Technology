<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Bar</title>
    <style>
        *{
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight:bolder;
        }
        nav{
            height:75px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            background-color:gold;

        }

        #logoblock,#menublock{
            height:75px;
            width:350px;
            display:flex;
            justify-content:space-evenly;
            align-items:center;
            

        }
        #logoblock{
            width:200px;
        }
        #menublock > a {
            text-decoration:none;
            color:black;
            
        }
        #logoblock img{
            width:120px;
        }
        #photoblock{
            height:100vh;
            width:100vw;
            border:2px solid black;
            display:flex;
            justify-content:space-evenly;
            align-items:center;
            background-color:darkgrey;
            
        }

        #left,#right{
            height:200px;
            width:200px;
            background-color:white;
            border-radius:10%;
            display:flex;
            justify-content:space-evenly;
            align-items:center;

        }
        #right img{
            height:100px;
        }
        #left img{
            height:100px;
        }
       
    </style>
</head>
<body>
    <nav>
        <div id="logoblock">
            <img src="https://www.freepnglogos.com/uploads/apple-music-logo-hd-png-10.png">
        </div>
        <div id="menublock">
            <a href="">Home</a>
            <a href="">About</a>
            <a href="">Contact</a>
            <a href="">Profile</a>
        </div>

    </nav>

    <!--Main Section-->
    <div id="photoblock">
        <div id="left">
            <img src="https://th.bing.com/th/id/OIP._UyvNtJSMUUdGz9uM9R4hwHaD4?w=337&h=180&c=7&r=0&o=7&dpr=2&pid=1.7&rm=3">
        </div>
        <div id="right">
            <img src="https://th.bing.com/th/id/OIP.ZY50ru3GfcjjAQTwAfbuWQHaHa?w=217&h=217&c=7&r=0&o=7&dpr=2&pid=1.7&rm=3">
        </div>
        
    </div>
</body>
</html>
