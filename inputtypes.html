<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Types</title>
</head>
<body>
    <label for="name">Enter your name:</label>
    <input type="text" id="name"><br><br>
    <label for="password">Enter Password:</label>
    <input type="password" id="password"><br><br>
    <label for="num">Enter the number:</label>
    <input type="number" id="num"><br><br>
    <label for="email">Enter E-mail:</label>
    <input type="Email" id="email"><br><br>
    <label for="date">Enter DOB:</label>
    <input type="Date" id="date"><br><br>
    <label for="mon">Enter Month:</label>
    <input type="Month" id="mon"><br><br>
    <label for="times">Enter Time:</label>
    <input type="time" id="times"><br><br>
    <label for="urls">Enter url:</label>
    <input type="url" id="urls"><br><br>
    <label for="tele">Enter Telecom:</label>
    <input type="tel" id="tele"><br><br>
    <label for="clr">Enter the Color:</label>
    <input type="color" id="clr"><br><br>
    <label for="files">Choose a file:</label>
    <input type="file" id="files"><br><br>
    <label for="ranges">Range:</label>
    <input type="range" id="ranges"><br><br>
    <label >Gender : </label><br>
    <input type="radio" name="gender" > Male<br>
    <input type="radio" name="gender"> Female<br>
    <input type="radio" name="gender"> Others<br>
    <label for="box">Range: </label><br>
    <input type="checkbox" id="box"> 1
    <input type="checkbox" id="box"> 2 
    <input type="checkbox" id="box"> 3 
    <input type="checkbox" id="box"> 4 <br><br>
    <input type="submit" value="login"><br><br>

    <select name="" id="">
        <option vlaue="india">INDIA</option>
        <option vlaue="Russia" selected>RUSSIA</option>
        <option vlaue="england">ENGLAND</option>
        <option vlaue="usa">USA</option>

    </select><br>

    <textarea name=""   id=""></textarea>
</body>
</html>
